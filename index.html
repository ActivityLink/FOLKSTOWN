<!DOCTYPE html>
<html class="light" lang="zh-TW">
<head>

  <script id="tailwind-config">

      theme: {

          colors: {

  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400; vertical-align: middle; }
    .icon-filled { font-variation-settings: 'FILL' 1, 'wght' 400; }
    
    body { background-color: #f8fafc; -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; overscroll-behavior-y: none; }
    input, textarea, select { -webkit-user-select: auto; user-select: auto; }

    .nav-btn .icon-box { @apply px-4 py-1.5 rounded-2xl transition-all flex items-center justify-center mb-0.5; }

    .nav-active .material-symbols-outlined { font-variation-settings: 'FILL' 1; }

    .bottom-sheet-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  </style>
</head>

    <div id="view-user-activities" class="hidden animate-in fade-in duration-500 pt-2 space-y-5">
      <div class="flex justify-between items-center pl-1">
        <div><h2 class="text-[24px] font-extrabold text-slate-800 tracking-tight">探索精彩活動</h2></div>

      </div>

      <div id="user-activities-container" class="grid grid-cols-2 gap-3 px-1"></div>
    </div>

    <!-- 報名紀錄 -->
    <div id="view-user-history" class="hidden animate-in fade-in pt-2 space-y-4">
      <h2 class="text-[24px] font-extrabold text-slate-800 tracking-tight pl-1">報名紀錄</h2>
      <div id="user-history-container" class="flex flex-col gap-4"></div>
    </div>

    <!-- 個人資料與專屬名片入口 -->
    <div id="view-user-profile" class="hidden animate-in fade-in pt-2 pb-10 space-y-4">
      
      <div id="my-card-entry" class="mb-5 bg-[#1e293b] rounded-[2rem] p-6 text-white shadow-lg flex justify-between items-center relative overflow-hidden cursor-pointer active:scale-[0.98] transition-transform hidden">
          <div class="absolute -right-4 -top-4 opacity-10"><span class="material-symbols-outlined text-[120px]">contact_mail</span></div>

      </div>
      
      <input type="file" id="profile-card-upload" accept="image/*" class="hidden" onchange="openCropper(this, 'profile')">

      <h2 class="text-[20px] font-extrabold text-slate-800 tracking-tight pl-1 mb-2">基本資料設定</h2>
      
      <div class="bg-white p-5 rounded-[2.5rem] shadow-sm border border-slate-100 transition-all">
          <div class="flex justify-between items-center cursor-pointer select-none active:opacity-70 transition-opacity" onclick="toggleProfileForm()">
              <div class="flex items-center gap-3">
                  <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center"><span class="material-symbols-outlined text-[20px]">manage_accounts</span></div>
                  <div class="flex flex-col">
                      <span class="text-[15px] font-bold text-slate-800">編輯個人通訊錄</span>
                      <span class="text-[11px] text-slate-400 font-medium">完整 14 欄位，與名片同步</span>
                  </div>
              </div>
              <span id="profile-chevron" class="material-symbols-outlined text-slate-400 transition-transform duration-300">expand_more</span>
          </div>

              </div>

              </div>

              <button id="btn-save-profile" onclick="submitProfileUpdate()" class="w-full py-4 bg-[#06C755] text-white rounded-2xl font-bold text-[16px] shadow-sm active:scale-[0.98] transition-transform mt-4">儲存設定</button>
          </div>

    </div>

    <!-- 後台：管理核銷 / CRM / 參數 (略，保持原有) -->
    <div id="view-admin-activities" class="hidden space-y-4 animate-in fade-in pt-2"></div>
    <div id="view-admin-stats" class="hidden space-y-4 animate-in slide-in-from-right-8 pt-2"></div>

  <nav id="bottom-nav-user" class="hidden fixed bottom-0 w-full max-w-md bg-white/95 backdrop-blur-xl flex justify-evenly items-center px-1 py-2 z-40 pb-safe shadow-[0_-10px_20px_rgba(0,0,0,0.03)] left-1/2 -translate-x-1/2 h-[76px] rounded-t-3xl border-t border-slate-100">
    <button onclick="switchView('user-activities')" id="nav-user-activities" class="nav-btn nav-active"><div class="icon-box"><span class="material-symbols-outlined text-[24px]">explore</span></div><span class="text-[10px] font-bold tracking-wide mt-0.5">探索</span></button>
    <button onclick="window.location.href='fate.html'" id="nav-user-fate" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined text-[24px]">psychology</span></div><span class="text-[10px] font-bold tracking-wide mt-0.5">配對</span></button>
    <button onclick="switchView('user-history')" id="nav-user-history" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined text-[24px]">receipt_long</span></div><span class="text-[10px] font-bold tracking-wide mt-0.5">紀錄</span></button>
    <button onclick="switchView('user-profile')" id="nav-user-profile" class="nav-btn"><div class="icon-box"><span class="material-symbols-outlined text-[24px]">person</span></div><span class="text-[10px] font-bold tracking-wide mt-0.5">設定</span></button>
  </nav>

  <nav id="bottom-nav-admin" class="hidden fixed bottom-0 w-full max-w-md bg-white/95 backdrop-blur-xl flex justify-evenly items-center px-1 py-2 z-40 pb-safe shadow-[0_-10px_20px_rgba(0,0,0,0.03)] left-1/2 -translate-x-1/2 h-[76px] rounded-t-3xl border-t border-slate-100">

  </nav>

<!-- 圖片裁切 Modal / 其他 Modal 略 -->

<script>
  const LIFF_ID = "2009367829-DLtYBDUm"; 
  const WORKER_URL = "https://actmaster.fangwl591021.workers.dev"; 
  const ADMIN_IDS = ["Uf729764dbb5b652a5a90a467320bea29", "U58eb5c1a747450140ce1335af709ae55", "U8932b891ad24da512afb9c1a6f41567b"]; 

  let userProfile = null, isRegistered = false, registeredInfo = null;

  async function fetchAPI(action, payload = {}) {
    const response = await fetch(WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action, payload }) });
    const result = await response.json();
    if (!result.success) throw new Error(result.error);
    return result.data;
  }

  document.addEventListener("DOMContentLoaded", async () => {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      
      userProfile = await liff.getProfile();
      document.getElementById('user-avatar').src = userProfile.pictureUrl || '';
      document.getElementById('user-profile-badge').classList.remove('hidden');

      const initData = await fetchAPI('initApp', { userId: userProfile.userId });
      isRegistered = initData.user.isRegistered;
      registeredInfo = initData.user.info;

      if (!isRegistered) {
          switchView('user-register');
          document.getElementById('reg-name').value = userProfile.displayName;
      } else {
          switchView('user-activities');
      }
      document.getElementById('view-loading').classList.add('hidden');
    } catch (err) {
      console.error(err);
    }
  });

  window.submitProfileUpdate = async function() {
    if (!userProfile) return;
    setButtonLoading('btn-save-profile', true);
    
    const getVal = (id) => document.getElementById(id).value.trim();
    // 確保 UID 一定會被發送，並包含所有 14 個核心欄位
    const p = { 
      userId: userProfile.userId, // 關鍵：寫入時強制帶上 UID
      name: getVal('edit-name'),
      englishName: getVal('edit-englishName'),
      title: getVal('edit-title'),
      department: getVal('edit-department'),
      industry: getVal('edit-industry'),
      taxId: getVal('edit-taxId'),
      phone: getVal('edit-phone'),
      tel: getVal('edit-tel'),
      ext: getVal('edit-ext'),
      email: getVal('edit-email'),
      fax: getVal('edit-fax'),
      birthday: getVal('edit-birthday'),
      social: getVal('edit-social'),
      address: getVal('edit-address')
    };
    
    try { 
      await fetchAPI('updateUser', p); 
      registeredInfo = p;
      showToast("儲存成功"); 
      toggleProfileForm(); 
    } catch(e) { 
      showToast("儲存失敗", true); 
    } finally { 
      setButtonLoading('btn-save-profile', false, '儲存設定'); 
    }
  }

  // 其他輔助函式保持不變...
  window.toggleProfileForm = function() {
      const body = document.getElementById('profile-form-body');
      const chevron = document.getElementById('profile-chevron');
      if (body.classList.contains('hidden')) {
          body.classList.remove('hidden');
          chevron.style.transform = 'rotate(180deg)';
          // 展開時代入現有資料
          if(registeredInfo) {
             const map = {'edit-name':'name','edit-englishName':'englishName','edit-title':'title','edit-department':'department','edit-industry':'industry','edit-taxId':'taxId','edit-phone':'phone','edit-tel':'tel','edit-ext':'ext','edit-email':'email','edit-fax':'fax', 'edit-birthday':'birthday','edit-social':'social','edit-address':'address'};
             for(let id in map) { const el = document.getElementById(id); if(el) el.value = registeredInfo[map[id]] || ''; }
          }
      } else {
          body.classList.add('hidden');
          chevron.style.transform = 'rotate(0deg)';
      }
  };
</script>
</body>
